model: openai/qwen-local
openai-api-base: http://127.0.0.1:8072/v1
model-settings-file: .ai/aider-model-settings.yml
model-metadata-file: .ai/aider-model-metadata.json
show-model-warnings: false

architect: false
edit-format: diff
thinking-tokens: "0"
check-model-accepts-settings: false

map-tokens: "0"
map-refresh: auto
max-chat-history-tokens: "8192" # 8192 tokens is the maximum for the model

auto-commits: false
dirty-commits: false
attribute-co-authored-by: false
show-diffs: true

auto-lint: true
auto-test: false

read:
  - .ai/prompts/PROJECT_RULES.md
  - .ai/prompts/PORTING_PATTERNS.md
  - .ai/prompts/GAMECUBE_LOCAL_MISSION.md
  - .ai/prompts/GAMECUBE_CONTEXT_INDEX.md
  - .ai/prompts/GAMECUBE_HARDWARE_NOTES.md
  - .ai/prompts/GAMECUBE_HOMEBREW_COMPLIANCE.md
  - .ai/prompts/GOLDSRC_CONTENT_FORMATS.md
  - .ai/prompts/GOLDSRC_SDK_NOTES.md
  - .ai/prompts/GAMECUBE_FAILURE_MEMORY.md

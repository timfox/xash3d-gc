model: openai/qwen-local
openai-api-base: http://127.0.0.1:8072/v1
show-model-warnings: false

architect: false
edit-format: diff
thinking-tokens: 0
check-model-accepts-settings: false

map-tokens: 2048
map-refresh: auto
max-chat-history-tokens: 131072

auto-commits: false
dirty-commits: false
attribute-co-authored-by: false
show-diffs: true

auto-lint: true
auto-test: false

read:
  - .ai/prompts/PROJECT_RULES.md
  - .ai/prompts/PORTING_PATTERNS.md
  - .ai/state/BLOCKERS.md
  - .ai/state/DECISIONS.md
  - Documentation/development/engine-porting-guide.md

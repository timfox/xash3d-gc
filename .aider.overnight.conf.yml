# Ultra-slim Aider profile for local 32k overnight passes.
# Explicit empty/near-empty read list is required: Aider merges this file with
# `.aider.conf.yml`, and omitting `read:` keeps the full prompt corpus.
model: openai/qwen-local
openai-api-base: http://127.0.0.1:8072/v1
model-settings-file: .ai/aider-model-settings.yml
model-metadata-file: .ai/aider-model-metadata.json
show-model-warnings: false

architect: false
edit-format: diff
thinking-tokens: 0
check-model-accepts-settings: false

map-tokens: 0
map-refresh: auto
max-chat-history-tokens: 128

auto-commits: false
dirty-commits: false
attribute-co-authored-by: false
show-diffs: true

auto-lint: false
auto-test: false

# Override the default 9-file prompt corpus from .aider.conf.yml.
read:
  - .ai/prompts/GAMECUBE_OVERNIGHT_BRIEF.md
